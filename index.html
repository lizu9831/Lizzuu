<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

background:

radial-gradient(circle at top,#29478f,#08111f 45%,#000);

}


/* Stars */

.stars{

position:absolute;

width:100%;
height:100%;

background-image:

radial-gradient(white 1px,transparent 1px);

background-size:60px 60px;

opacity:.7;

animation:twinkle 4s infinite alternate;

}

@keyframes twinkle{

from{

opacity:.4;

}

to{

opacity:.8;

}

}

.counter{

margin-top:18px;

color:#b7d9ff;

font-size:14px;

}

.counter img{

height:18px;

vertical-align:middle;

margin-left:6px;

border-radius:4px;

}


/* Shooting Stars */

.shooting{

position:absolute;

width:140px;

height:2px;

background:

linear-gradient(

90deg,

white,

rgba(255,255,255,0)

);

border-radius:50%;

filter:drop-shadow(0 0 8px white);

transform:rotate(-35deg);

opacity:0;

}


/* First */

.s1{

top:12%;

left:-20%;

animation:meteor1 6s linear infinite;

}


/* Second */

.s2{

top:30%;

left:-30%;

animation:meteor2 8s linear infinite;

animation-delay:2s;

}


/* Third */

.s3{

top:55%;

left:-25%;

animation:meteor3 7s linear infinite;

animation-delay:4s;

}


@keyframes meteor1{

0%{

transform:

translate(0,0)

rotate(-155deg);

opacity:0;

}

10%{

opacity:1;

}

100%{

transform:

translate(700px,350px)

rotate(-155deg);

opacity:0;

}

}



@keyframes meteor2{

0%{

transform:

translate(0,0)

rotate(-155deg);

opacity:0;

}

15%{

opacity:1;

}

100%{

transform:

translate(850px,450px)

rotate(-155deg);

opacity:0;

}

}



@keyframes meteor3{

0%{

transform:

translate(0,0)

rotate(-155deg);

opacity:0;

}

20%{

opacity:1;

}

100%{

transform:

translate(650px,320px)

rotate(-155deg);

opacity:0;

}

}



/* Glow */

.glow{

position:absolute;

width:400px;

height:400px;

border-radius:50%;

background:

rgba(0,120,255,.12);

filter:blur(100px);

}


/* Card */

.card{

position:relative;

z-index:10;

width:290px;

padding:28px;

text-align:center;

border-radius:25px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.15);

box-shadow:

0 0 30px rgba(0,170,255,.3),

0 0 80px rgba(0,100,255,.15);

}


/* Heading */

h1{

font-size:36px;

color:white;

text-shadow:

0 0 10px #4aa3ff,

0 0 25px #4aa3ff,

0 0 50px #4aa3ff;

}


/* Subtitle */

.tag{

margin:15px 0 28px;

color:#b7d9ff;

font-size:16px;

line-height:1.6;

}



/* Buttons */

a{

display:block;

text-decoration:none;

padding:13px;

margin:10px 0;

border-radius:18px;

background:rgba(255,255,255,.08);

color:white;

font-size:16px;

transition:.3s;

}


a:hover{

transform:scale(1.05);

background:rgba(0,170,255,.25);

box-shadow:

0 0 20px rgba(0,170,255,.3);

}



/* Bottom */

.bottom{

margin-top:28px;

color:#ddd;

font-size:16px;

}

</style>
